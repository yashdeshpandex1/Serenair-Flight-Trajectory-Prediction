version: "3.9"
services:
  app:
    build: .
    container_name: serenair_app
    restart: unless-stopped
    env_file: .env
    environment:
      - REDIS_HOST=redis
    depends_on:
      - redis
    networks:
      - app_network
    mem_limit: 2500m
    volumes:
      - ./models:/repo/models
      - ./data:/repo/data
      - ./config.json:/repo/config.json:ro    # ← added
  redis:
    image: redis:7-alpine
    container_name: redis_cache
    restart: unless-stopped
    command: redis-server --maxmemory 300mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - app_network
    mem_limit: 350m
  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - app_network
    mem_limit: 100m
volumes:
  redis_data:
networks:
  app_network:
    driver: bridge